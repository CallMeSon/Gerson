name: Deploy to Server

on:
  push:
    branches:
      - main  # Ganti dengan 'master' jika branch utama Anda masih bernama master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands using ssh key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /home/econ/Gerson  # Ganti dengan alamat path folder projek Anda di server VPS
            git pull origin main
            
            # --- Perintah Restart Aplikasi Anda di Server ---
            # Jika menggunakan Docker Compose, aktifkan baris di bawah ini:
            docker compose up -d --build
