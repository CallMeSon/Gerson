version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gerson-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: gerson_portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gerson-backend
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/gerson_portfolio
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_APP_MODE=guest # Build as 'guest' mode by default. Change to 'admin' if you want admin panel enabled.
    container_name: gerson-frontend
    restart: always
    ports:
      - "8090:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

  adminer:
    image: adminer
    container_name: gerson-adminer
    restart: always
    ports:
      - "8085:8080"
    networks:
      - portfolio-network

volumes:
  postgres_data:

networks:
  portfolio-network:
    driver: bridge
