version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gerson-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: gerson_portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: gerson-adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  postgres_data:
